<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruan Cunha — Links</title>
<meta name="description" content="Marketing e produção de eventos · Brasília-DF. WhatsApp, portfólio e redes do Ruan Cunha e da Agência LANÇAR.">
<meta name="theme-color" content="#0B0814">

<!-- favicon -->
<link rel="icon" href="avatar.jpg">
<link rel="apple-touch-icon" href="avatar.jpg">

<!-- prévia ao compartilhar (Open Graph / Twitter) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Ruan Cunha — Links">
<meta property="og:description" content="Marketing e produção de eventos · Brasília-DF. Fala comigo no WhatsApp.">
<meta property="og:image" content="https://link-mu-roan.vercel.app/avatar.jpg">
<meta property="og:url" content="https://link-mu-roan.vercel.app/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ruan Cunha — Links">
<meta name="twitter:description" content="Marketing e produção de eventos · Brasília-DF.">
<meta name="twitter:image" content="https://link-mu-roan.vercel.app/avatar.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0814;
    --ink:#F6F1EA;
    --muted:#9C93AD;
    --amber:#FF9E2C;
    --coral:#FF5277;
    --magenta:#C724B1;
    --violet:#5B2A9E;
    --card:rgba(255,255,255,.045);
    --card-line:rgba(255,255,255,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:0 22px 56px;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* sunset-to-night glow — the signature */
  .horizon{
    position:fixed;
    top:-12%;
    left:50%;
    transform:translateX(-50%);
    width:140%;
    max-width:760px;
    aspect-ratio:1/1;
    background:
      radial-gradient(60% 55% at 50% 38%,
        rgba(255,158,44,.42) 0%,
        rgba(255,82,119,.34) 26%,
        rgba(199,36,177,.24) 48%,
        rgba(91,42,158,.12) 66%,
        transparent 74%);
    filter:blur(8px);
    z-index:0;
    animation:drift 14s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes drift{
    0%{transform:translateX(-50%) translateY(0) scale(1)}
    100%{transform:translateX(-50%) translateY(2.5%) scale(1.06)}
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:430px;
    padding-top:64px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* avatar */
  .avatar{
    width:104px;height:104px;border-radius:50%;
    padding:3px;
    background:conic-gradient(from 200deg,var(--amber),var(--coral),var(--magenta),var(--violet),var(--amber));
    box-shadow:0 0 60px rgba(255,82,119,.45),0 0 24px rgba(255,158,44,.35);
    animation:spin 8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .avatar > div{animation:spin 8s linear infinite reverse}
  .avatar > div{
    width:100%;height:100%;border-radius:50%;
    background:linear-gradient(150deg,#1a1322,#0d0a14);
    display:flex;align-items:center;justify-content:center;
    font-family:"Anton",sans-serif;font-size:46px;
    color:var(--ink);overflow:hidden;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;object-position:50% 44%;border-radius:50%}

  .name{
    font-family:"Anton",sans-serif;
    font-size:40px;
    letter-spacing:.5px;
    text-transform:uppercase;
    margin-top:18px;
    line-height:.96;
    text-align:center;
  }
  .name b{
    background:linear-gradient(100deg,var(--amber),var(--coral) 35%,var(--magenta) 65%,var(--violet),var(--amber));
    background-size:220% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shine 5s linear infinite;
  }
  @keyframes shine{to{background-position:220% center}}
  .tag{
    margin-top:10px;
    color:var(--muted);
    font-size:14.5px;
    text-align:center;
    line-height:1.45;
    max-width:300px;
  }
  .meta{
    margin-top:12px;
    display:flex;align-items:center;gap:7px;
    font-size:12px;font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;color:var(--muted);
  }
  .meta .dot{width:5px;height:5px;border-radius:50%;background:var(--coral)}

  .links{
    width:100%;
    margin-top:30px;
    display:flex;flex-direction:column;gap:13px;
  }
  .lbl{
    font-size:11px;font-weight:700;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);
    margin:6px 2px 0;
  }

  a.link{
    position:relative;
    display:flex;align-items:center;gap:14px;
    padding:16px 17px;
    border-radius:16px;
    background:var(--card);
    border:1px solid var(--card-line);
    color:var(--ink);text-decoration:none;
    transition:transform .18s ease,border-color .18s ease,background .18s ease;
    -webkit-tap-highlight-color:transparent;
  }
  a.link:hover,a.link:active{transform:translateY(-3px) scale(1.015);border-color:rgba(255,255,255,.30);background:rgba(255,255,255,.08);box-shadow:0 10px 30px rgba(0,0,0,.35)}
  a.link:focus-visible{outline:2px solid var(--coral);outline-offset:3px}
  /* sheen sweep on hover */
  a.link::after{
    content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.14) 48%,transparent 60%);
    background-size:250% 100%;background-position:160% 0;opacity:0;transition:opacity .2s ease;
  }
  a.link:hover::after{opacity:1;animation:sheen .9s ease forwards}
  @keyframes sheen{to{background-position:-60% 0}}
  /* staggered entrance */
  a.link{animation:rise .55s cubic-bezier(.2,.8,.2,1) backwards}
  a.link:nth-child(2){animation-delay:.05s}
  a.link:nth-child(3){animation-delay:.12s}
  a.link:nth-child(4){animation-delay:.19s}
  a.link:nth-child(5){animation-delay:.26s}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .ic{
    flex:0 0 42px;height:42px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.06);
  }
  .ic svg{width:21px;height:21px}
  .txt{display:flex;flex-direction:column;gap:2px;min-width:0}
  .txt .t{font-size:15.5px;font-weight:600}
  .txt .s{font-size:12.5px;color:var(--muted)}
  .arr{margin-left:auto;color:var(--muted);flex:0 0 auto}

  /* primary CTA = whatsapp */
  a.link.primary{
    background:linear-gradient(100deg,rgba(255,158,44,.16),rgba(255,82,119,.16),rgba(199,36,177,.16));
    border:1px solid transparent;
    background-origin:border-box;
    box-shadow:0 8px 30px rgba(255,82,119,.14);
  }
  a.link.primary::before{
    content:"";position:absolute;inset:0;border-radius:16px;padding:1px;
    background:linear-gradient(100deg,var(--amber),var(--coral),var(--magenta));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
  }
  a.link.primary .ic{background:linear-gradient(135deg,var(--amber),var(--coral))}
  a.link.primary .ic svg{color:#0B0814}

  .foot{
    margin-top:34px;text-align:center;
    font-size:12px;color:var(--muted);letter-spacing:.02em;
  }
  .foot b{font-family:"Anton",sans-serif;font-weight:400;letter-spacing:1px;color:var(--ink)}

  @media (prefers-reduced-motion:reduce){
    .horizon,.avatar,.avatar>div,.name b,a.link{animation:none}
    a.link{transition:none}
  }
</style>
</head>
<body>
  <div class="horizon"></div>
  <main class="wrap">
    <div class="avatar"><div id="av">R</div></div>
    <h1 class="name">RUAN <b>CUNHA</b></h1>
    <p class="tag">Marketing e produção de eventos</p>
    <div class="meta"><span class="dot"></span> Brasília · DF</div>

    <nav class="links" id="links"></nav>

    <p class="foot">Ruan Cunha · Brasília</p>
  </main>

<script>
/* ===========================================================
   👉 EDITE AQUI — é só trocar os links abaixo
   =========================================================== */
const CONFIG = {
  // foto: cole a URL de uma imagem sua. Deixe "" pra usar a inicial "R"
  avatar: "avatar.jpg",

  links: [
    {
      group: "Fala comigo",
      items: [
        {
          t: "WhatsApp",
          s: "Orçamento e contato",
          // 👇 TROQUE pelo seu número (formato: 55 + DDD + número)
          url: "https://wa.me/5561991893159?text=Oi%20Ruan",
          primary: true,
          icon: "whats"
        },
        {
          t: "@ruanrpessoal_",
          s: "Meu Instagram",
          url: "https://instagram.com/ruanrpessoal_",
          icon: "insta"
        }
      ]
    },
    {
      group: "Agência LANÇAR",
      items: [
        {
          t: "Portfólio",
          s: "Sites e projetos",
          url: "https://portifolio-ruan.vercel.app",
          icon: "globe"
        },
        {
          t: "@lancar",
          s: "Tráfego, social e sites",
          // 👇 confirme/ajuste o @ da LANÇAR
          url: "https://instagram.com/lancar",
          icon: "insta"
        }
      ]
    }
  ]
};

/* ===== ícones ===== */
const ICONS = {
  whats:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.3L2 22l4.8-1.5A10 10 0 1 0 12 2Zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.9.9-2.8-.2-.3A8 8 0 1 1 12 20Zm4.4-5.6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8.9-.3.2-.5 0a6.6 6.6 0 0 1-2-1.2 7.3 7.3 0 0 1-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4a.4.4 0 0 0 0-.4l-.8-1.9c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 0 0-.7.3 2.8 2.8 0 0 0-.9 2.1 4.9 4.9 0 0 0 1 2.6 11 11 0 0 0 4.3 3.8c2.5 1 2.5.7 3 .6a2.5 2.5 0 0 0 1.6-1.1 2 2 0 0 0 .1-1.1c0-.1-.2-.2-.4-.3Z"/></svg>',
  globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>',
  insta:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
  ticket:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1-2 2v0a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4 2 2 0 0 1 0-4Z"/><path d="M9 6v12" stroke-dasharray="2 2"/></svg>'
};
const ARROW='<svg class="arr" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';

/* ===== render ===== */
if(CONFIG.avatar){
  document.getElementById('av').innerHTML='<img src="'+CONFIG.avatar+'" alt="Ruan">';
}
const root=document.getElementById('links');
CONFIG.links.forEach(g=>{
  const lbl=document.createElement('div');
  lbl.className='lbl';lbl.textContent=g.group;
  root.appendChild(lbl);
  g.items.forEach(it=>{
    const a=document.createElement('a');
    a.className='link'+(it.primary?' primary':'');
    a.href=it.url;a.target='_blank';a.rel='noopener';
    a.innerHTML=
      '<span class="ic">'+(ICONS[it.icon]||ICONS.globe)+'</span>'+
      '<span class="txt"><span class="t">'+it.t+'</span><span class="s">'+it.s+'</span></span>'+
      ARROW;
    root.appendChild(a);
  });
});
</script>
</body>
</html>
